version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tfiverse_postgres
    restart: always
    environment:
      POSTGRES_USER: tfiverse
      POSTGRES_PASSWORD: newpassword123
      POSTGRES_DB: tfiverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
